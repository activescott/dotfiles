# Enable tmux mouse mode so the scroll wheel scrolls output history.
#
# Counterintuitively, mouse mode is what makes the wheel scroll previous command
# *output* (stdout) instead of command history:
#
#   mouse off (tmux default): tmux ignores the wheel. Because tmux runs in the
#   terminal's alternate screen, the terminal emulator translates a scroll-up
#   into the up-arrow key, which walks shell command history. Not what we want.
#
#   mouse on: tmux captures the wheel and enters copy-mode, scrolling the pane's
#   scrollback buffer = real stdout from past commands. This is what we want.
#
# Exit copy-mode with q. Copy-mode is also reachable via prefix + [.
#
# Tradeoff: with mouse on, dragging to select text uses tmux's own selection
# (copies into the tmux buffer) instead of the terminal emulator's native
# select/copy. Hold Shift while dragging to bypass tmux and use the terminal's
# native copy/paste.
#
# Context: https://askai.glarity.app/search/How-to-disable-mouse-scrolling-through-command-history-in-tmux
set -g mouse on
